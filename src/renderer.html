<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cookie Audit Scanner</title>
  <link rel="stylesheet" href="renderer.css" />
</head>

<body>
  <main class="app">
    <header>
      <div>
        <h1>Cookie Audit Scanner</h1>
        <p>Desktop full-site cookie scanner using Chromium automation.</p>
      </div>
    </header>

    <section class="panel controls">
      <label>
        Website URL
        <input id="url" placeholder="Enter website URL, e.g. https://example.com" />
      </label>

      <label>
        Max pages
        <input id="maxPages" type="number" min="1" max="10000" value="1000" />
      </label>

      <label>
        Consent mode
        <select id="consentMode">
          <option value="none">No action</option>
          <option value="accept">Accept</option>
          <option value="reject">Reject</option>
        </select>
      </label>

      <button id="runScan">Run full-site scan</button>
    </section>

    <section class="status" id="status">Ready.</section>

    <div id="output"></div>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
